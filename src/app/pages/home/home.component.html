<div class="container mt-5">
    <!-- Hero Carousel Section -->
    <div id="carouselExampleIndicators" class="carousel slide shadow-lg rounded-4 overflow-hidden" data-bs-ride="carousel">
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active"
                aria-current="true" aria-label="Slide 1"></button>
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1"
                aria-label="Slide 2"></button>
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2"
                aria-label="Slide 3"></button>
        </div>
        <div class="carousel-inner">
            <div class="carousel-item active position-relative">
                <img src="https://images.unsplash.com/photo-1441986300917-64674bd600d8?auto=format&fit=crop&w=1200&q=80"
                    class="d-block w-100" style="height: 500px; object-fit: cover;" alt="Fashion">
                <div class="carousel-caption d-none d-md-block glass-panel p-4 mb-5">
                    <h1 class="display-4 fw-bold mb-3">Premium Collection</h1>
                    <p class="lead mb-4">Discover the latest trends in global fashion and lifestyle.</p>
                </div>
            </div>
            <div class="carousel-item">
                <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=1200&q=80" 
                    class="d-block w-100" style="height: 500px; object-fit: cover;" alt="Electronics">
                <div class="carousel-caption d-none d-md-block glass-panel p-4 mb-5 text-dark">
                    <h1 class="display-4 fw-bold mb-3">Cutting Edge Tech</h1>
                    <p class="lead mb-4">Innovation that reshapes your everyday life.</p>
                </div>
            </div>
            <div class="carousel-item">
                <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=1200&q=80" 
                    class="d-block w-100" style="height: 500px; object-fit: cover;" alt="Shoes">
                <div class="carousel-caption d-none d-md-block glass-panel p-4 mb-5">
                    <h1 class="display-4 fw-bold mb-3">Athletic Excellence</h1>
                    <p class="lead mb-4">Performance meets style in our newest arrivals.</p>
                </div>
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators"
            data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators"
            data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </button>
    </div>

    <!-- Call to Action -->
    <div class="text-center mt-5 mb-5 pb-5">
        <h2 class="mb-4">Ready to Explore?</h2>
        <a class="btn btn-success btn-lg px-5 shadow animate__animated animate__pulse animate__infinite" [routerLink]="['/products']" routerLinkActive="active">
            Shop Our Products <i class="bi bi-arrow-right ms-2"></i>
        </a>
    </div>

</div>
