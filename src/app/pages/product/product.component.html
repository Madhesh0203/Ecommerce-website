<div *ngIf="product" class="container mt-5 animate__animated animate__fadeIn">
    <div class="mb-4">
        <a [routerLink]="['/products']" class="btn btn-link text-decoration-none text-muted p-0">
            <i class="bi bi-arrow-left me-2"></i>Back to Products
        </a>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="glass-panel overflow-hidden shadow-lg">
                <div class="row g-0">
                    <div class="col-md-6 border-end border-light border-opacity-10">
                        <img [src]="product.url || 'https://images.unsplash.com/photo-1555041469-a586c61ea9bc?auto=format&fit=crop&w=600&q=80'" 
                             class="img-fluid w-100 h-100" style="object-fit: cover;" alt="{{product.name}}">
                    </div>
                    <div class="col-md-6 d-flex align-items-center">
                        <div class="card-body p-5">
                            <span class="badge bg-primary-soft text-primary mb-3 px-3 py-2 rounded-pill bg-opacity-10">Product Details</span>
                            <h1 class="display-6 fw-bold mb-3 text-dark">{{product.name}}</h1>
                            <div class="mb-4">
                                <span class="h2 fw-bold text-success">$ {{product.price | number: '2.'}}</span>
                            </div>
                            <p class="text-muted mb-4 lead">{{product.description}}</p>
                            
                            <hr class="my-4 opacity-10">
                            
                            <div class="row text-center g-3 mb-4">
                                <div class="col-6">
                                    <div class="p-3 bg-light rounded-4">
                                        <div class="small text-muted mb-1">SKU</div>
                                        <div class="fw-bold">{{product.code}}</div>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="p-3 bg-light rounded-4">
                                        <div class="small text-muted mb-1">Shipping</div>
                                        <div class="fw-bold text-primary">Free</div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="d-grid gap-3">
                                <button class="btn btn-success btn-lg rounded-pill shadow-sm py-3" (click)="addToCart()">
                                    <i class="bi bi-cart-plus me-2"></i>Add to Cart
                                </button>
                                <button class="btn btn-outline-secondary btn-lg rounded-pill py-3">
                                    <i class="bi bi-heart me-2"></i>Wishlist
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
